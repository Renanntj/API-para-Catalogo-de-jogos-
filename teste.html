<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Feed de Publicações</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #0a0a0a, #050505);
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* título */

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: #00aaff;
            text-shadow: 0 0 15px #008cff;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* feed */

        #feed {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        /* post */

        .post {
            background: #0f0f0f;
            border-radius: 14px;
            padding: 22px;
            border: 1px solid rgba(0, 170, 255, 0.25);
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.15);
            transition: .3s;
        }

        .post:hover {
            box-shadow: 0 0 30px rgba(0, 170, 255, 0.35);
            transform: translateY(-3px);
        }

        /* header */

        .post-header {
            font-size: .9rem;
            color: #9aa0a6;
            margin-bottom: 12px;
        }

        /* titulo */

        .post h2 {
            color: #00b7ff;
            margin-bottom: 6px;
            font-size: 1.3rem;
        }

        /* descrição */

        .post p {
            color: #d0d0d0;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        /* imagem */

        .post-image {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }

        .post-image img {
            max-width: 320px;
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 170, 255, .25);
            transition: .3s;
        }

        .post-image img:hover {
            transform: scale(1.03);
        }

        /* ações */

        .post-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            font-size: 22px;
            cursor: pointer;
        }

        .like {
            color: #888;
            transition: .2s;
        }

        .like:hover {
            color: #00aaff;
            transform: scale(1.2);
        }

        .liked {
            color: #ff2e63;
        }

        /* loading */

        .loading {
            text-align: center;
            color: #888;
        }

        /* responsivo */

        @media(max-width:600px) {

            h1 {
                font-size: 1.7rem;
                text-align: center;
            }

            .post-image img {
                max-width: 100%;
            }

        }
    </style>

</head>

<body>

    <h1>Publicações</h1>

    <div id="feed" class="loading">
        Carregando publicações...
    </div>

    <script>

        async function carregarPosts() {

            try {

                const response = await fetch('http://127.0.0.1:8000/principal/publicacoes');

                const posts = await response.json();

                const feed = document.getElementById('feed');

                feed.innerHTML = '';

                posts.forEach(post => {

                    const postElement = document.createElement('div');

                    postElement.className = 'post';

                    postElement.innerHTML = `

<div class="post-header">
Postado por <strong>${post.autor.usuario}</strong>
</div>

<h2>${post.titulo}</h2>

<p>${post.descricao || 'Sem descrição'}</p>

<div class="post-image">
<img src="http://127.0.0.1:8000/principal/imagem/${post.id}/">
</div>

<div class="post-actions">
<span class="like">❤️</span>
</div>

`;

                    feed.appendChild(postElement);

                });

            } catch (error) {

                document.getElementById('feed').innerHTML = '<p class="loading">Erro ao carregar posts. Verifique se a API está rodando.</p>';

            }

        }

        carregarPosts();

        /* sistema de like */

        document.addEventListener("click", function (e) {

            if (e.target.classList.contains("like")) {
                e.target.classList.toggle("liked")
            }

        })

    </script>

</body>

</html>
